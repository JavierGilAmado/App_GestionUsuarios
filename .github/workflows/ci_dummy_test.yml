name: Dummy Test CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Maven verify (lint + compile)
        run: mvn -B -DskipTests verify

  dummy-tests:
    name: Run Dummy Tests
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run only dummy test
        # Usamos un filtro de Maven para ejecutar solo este test y no los de MySQL
        run: mvn -B test -Dtest=DummyTest

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: dummy-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app_gestionusuarios:ci .