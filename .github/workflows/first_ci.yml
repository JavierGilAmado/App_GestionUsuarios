name: First CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Maven verify (lint + compile)
        run: mvn -B -DskipTests verify

  tests:
    name: Run Tests with MySQL
    runs-on: ubuntu-latest
    needs: quality-check

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.CI_DB_NAME }}
          MYSQL_USER: ${{ secrets.CI_DB_USER }}
          MYSQL_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 3306:3306
        # --- SOLUCION DEL PROBLEMA ---
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          -v ${{ github.workspace }}/init.sql:/docker-entrypoint-initdb.d/init.sql
        # ------------------------------------

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Database Config File
        run: |
          mkdir -p src/main/resources
          echo "db.url=jdbc:mysql://localhost:3306/${{ secrets.CI_DB_NAME }}" > src/main/resources/config.properties
          echo "db.user=${{ secrets.CI_DB_USER }}" >> src/main/resources/config.properties
          echo "db.password=${{ secrets.CI_DB_PASSWORD }}" >> src/main/resources/config.properties

      - name: Run tests
        run: mvn -B test

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app_gestionusuarios:ci .
