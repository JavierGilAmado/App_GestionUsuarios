name: First CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:

  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Maven verify (lint + compile)
        run: mvn -B -DskipTests verify


  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Si no tienes tests, este script asegura que el job pase igualmente
      - name: Run tests
        run: |
          if mvn -q test; then
            echo "Tests passed"
          else
            echo "No tests found or tests failed"
            exit 1
          fi


  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app_gestionusuarios:ci .