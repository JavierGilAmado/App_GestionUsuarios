name: Create Image Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Maven verify (lint + compile)
        run: mvn -B -DskipTests verify

  dummy-tests:
    name: Run Dummy Tests
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run only dummy test
        run: mvn -B test -Dtest=DummyTest

  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: dummy-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # PASO NUEVO: Creamos una variable de entorno en minúsculas
      - name: Set lowercase repository name
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/app_gestionusuarios" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usamos la variable ${{ env.IMAGE_NAME }} que creamos arriba
          tags: |
            ${{ env.IMAGE_NAME }}:1.0
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}